# git-lex kit configuration
# AutoKnow: automated knowledge organization from unstructured sources.

name: autoknow

# Adaptive kit — ontology seeds to _ontology/ and is owned/edited by the
# AutoKnow subagents (Ontologist) at runtime. SHACL shapes regenerate from
# _ontology/ on every `git lex save`.
adaptive: true

# Folder installation — create class folders from the ontology.
install folders: true
folder base: AutoKnow
folder ontology: autoknow.ttl
